spring.application.name=BRMS-Application

spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS02:1433;databaseName=BRMS_DB;encrypt=true;trustServerCertificate=true
spring.datasource.username=your_sql_server_username
spring.datasource.password=your_sql_server_password
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=true

app.cors.allowed-origins=http://localhost:3000
